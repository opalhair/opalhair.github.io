<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <style>
        /* 1. 全局定义核心图案（修复后的经典剪刀路径）*/
        .adaptive-scissors {
            fill-rule: evenodd;
        }

        /* 2. 默认状态 (浅色模式) */
        /* 显示黑色圆形底座 */
        .adaptive-circle {
            fill: #111;
        }
        /* 显示白色“经典剪刀” */
        .adaptive-scissors {
            fill: #fff;
        }

        /* 3. 🧠 极客魔法：深色模式自动执行 */
        @media (prefers-color-scheme: dark) {
            /* 切换为白色圆形底座 */
            .adaptive-circle {
                fill: #fff;
            }
            /* 切换为黑色“经典剪刀” */
            .adaptive-scissors {
                fill: #111;
            }
        }
    </style>

    <circle class="adaptive-circle" cx="50" cy="50" r="48" />

    <path class="adaptive-scissors" d="M50 32 a 4 4 0 1 0 -8 0 a 4 4 0 0 0 8 0 z m-4 0 a 1 1 0 1 0 -2 0 a 1 1 0 0 0 2 0 zm4 -2 c 1 0 2 0.5 2 2 c 0 1.5 -1 2 -2 2 c -1 0 -2 -0.5 -2 -2 c 0 -1.5 1 -2 2 -2 zm0 1 c -0.5 0 -1 0.25 -1 1 c 0 0.75 0.5 1 1 1 c 0.5 0 1 -0.25 1 -1 c 0 -0.75 -0.5 -1 -1 -1 zm0 7 c -0.5 0 -1 0.25 -1 1 c 0 0.75 0.5 1 1 1 c 0.5 0 1 -0.25 1 -1 c 0 -0.75 -0.5 -1 -1 -1 zM32 65 a 8 8 0 1 1 0 -16 a 8 8 0 0 1 0 16 zm0 -12 a 4 4 0 1 0 0 -8 a 4 4 0 0 0 0 8 zm36 12 a 8 8 0 1 1 0 -16 a 8 8 0 0 1 0 16 zm0 -12 a 4 4 0 1 0 0 -8 a 4 4 0 0 0 0 8 z" />
</svg>
