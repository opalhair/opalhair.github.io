<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <style>
        /* 1. 默认状态 (浅色模式) */
        /* 显示白色圆形底座 */
        .white-circle { display: block; fill: #fff; }
        /* 隐藏黑色圆形底座 */
        .black-circle { display: none; fill: #111; }
        /* 显示黑色剪刀剪影 */
        .black-scissors { display: block; fill: #111; }
        /* 隐藏白色剪刀剪影 */
        .white-scissors { display: none; fill: #fff; }

        /* 2. 🧠 极客魔法：媒体查询，当用户启用深色模式时自动执行 */
        @media (prefers-color-scheme: dark) {
            /* 隐藏白色圆形底座 */
            .white-circle { display: none; }
            /* 显示黑色圆形底座 */
            .black-circle { display: block; }
            /* 隐藏黑色剪刀剪影 */
            .black-scissors { display: none; }
            /* 显示白色剪刀剪影 */
            .white-scissors { display: block; }
        }
    </style>

    <circle class="white-circle" cx="50" cy="50" r="50" />
    <circle class="black-circle" cx="50" cy="50" r="50" />

